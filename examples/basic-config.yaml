# basic-config.yaml - Example configuration for POC
# Matches the Pydantic models in sidecar/config/settings.py

version: "1.0"

server:
  inbound_port: 15000
  outbound_port: 15001
  admin_port: 15002

discovery:
  type: static
  refresh_interval: 30

routes:
  - name: backend
    match:
      host: backend.local
    cluster: backend
    timeout: 30
    weight: 100

rate_limits:
  - scope: global
    limit: 1000
    window: 1
  - scope: client
    limit: 100
    window: 1

telemetry:
  enabled: true
  port: 15002
  path: /sidecar/metrics

logging:
  level: info
  format: json
